<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mesto</title>
    <!-- Стили теперь импортируются в index.js, поэтому <link> удалён -->
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          src="./src/images/logo.svg"
          alt="Логотип проекта место"
          class="logo header__logo"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div
            class="profile__image"
            style="background-image: url('./src/images/avatar.jpg')"
          ></div>
          <div class="profile__info">
            <h1 class="profile__title">Жак-Ив Кусто</h1>
            <button class="profile__edit-button" type="button"></button>
            <p class="profile__description">Исследователь океана</p>
          </div>
          <button class="profile__add-button" type="button"></button>
        </section>
        <section class="places page__section">
          <ul class="places__list"></ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Mesto Russia</p>
      </footer>

      <!-- Попапы (оставлены без изменений) -->
      <div class="popup popup_type_edit">...</div>
      <div class="popup popup_type_new-card">...</div>
      <div class="popup popup_type_image">...</div>
      <div class="popup popup_type_edit-avatar">...</div>

      <div class="popup popup_type_info">
        <div class="popup__content popup__content_content_info">
          <button type="button" class="popup__close"></button>
          <h3 class="popup__title">Статистика карточки</h3>
          <dl class="popup-info__definition-list"></dl>
          <h4 class="popup-info__users-title">Кому понравилось:</h4>
          <ul class="popup-info__users-list"></ul>
        </div>
      </div>
    </div>

    <script src="./src/scripts/index.js" defer type="module"></script>

    <template id="card-template">...</template>
    <template id="popup-info-definition-template">...</template>
    <template id="popup-info-user-preview-template">...</template>
  </body>
</html>
